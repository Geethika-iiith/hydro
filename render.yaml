services:
  # Backend Service
  - type: web
    name: hydro-backend
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: PORT
        value: 10000

  # Frontend Static Site
  - type: static
    name: hydro-frontend
    env: static
    region: oregon
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishDir: frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: hydro-backend
          property: host
